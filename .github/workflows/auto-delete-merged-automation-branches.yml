name: Auto-delete merged automation branches

# Cleans up short-lived branches created by automated coding agents once their
# pull request is merged into main. Matches common agent branch prefixes so the
# Actions tab and branch list stay tidy.

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write

jobs:
  delete-branch:
    if: >-
      github.event.pull_request.merged == true &&
      (
        startsWith(github.event.pull_request.head.ref, 'claude/') ||
        startsWith(github.event.pull_request.head.ref, 'codex/') ||
        startsWith(github.event.pull_request.head.ref, 'copilot/')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          gh api \
            --method DELETE \
            /repos/${REPO}/git/refs/heads/${BRANCH}
