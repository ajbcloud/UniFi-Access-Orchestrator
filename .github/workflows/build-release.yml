name: Build & Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v4.1.6). Defaults to package.json version if left blank.'
        required: false
        default: ''
permissions:
  contents: write
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build Windows installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.exe.blockmap
          retention-days: 5
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build Linux packages (x64)
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/*.AppImage
            dist/*amd64.deb
          retention-days: 5
  build-linux-arm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build Linux ARM package (Raspberry Pi)
        run: npm run build:pi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Linux ARM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm-build
          path: |
            dist/*armv7l.deb
          retention-days: 5
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate macOS app icon (1024x1024)
        run: sips -z 1024 1024 assets/icon_256.png --out assets/icon.png
      - name: Verify macOS icon dimensions
        run: |
          python - <<'PYICON'
          import struct
          from pathlib import Path
          icon = Path('assets/icon.png')
          data = icon.read_bytes()
          if data[:8] != b'\x89PNG\r\n\x1a\n':
            raise SystemExit('assets/icon.png is not a PNG file')
          width, height = struct.unpack('>II', data[16:24])
          print(f'assets/icon.png => {width}x{height}')
          if width < 512 or height < 512:
            raise SystemExit('Icon must be at least 512x512 for macOS packaging')
          PYICON
      - name: Build macOS package
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            dist/*.dmg
          retention-days: 5
  release:
    needs: [build-windows, build-linux, build-linux-arm, build-mac]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Resolve release tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          elif [ -n "${{ inputs.version }}" ]; then
            TAG="${{ inputs.version }}"
            # Ensure the tag starts with 'v'
            [[ "$TAG" != v* ]] && TAG="v${TAG}"
          else
            PKG_VERSION=$(node -p "require('./package.json').version")
            TAG="v${PKG_VERSION}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f | sort
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: UniFi Access Orchestrator ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/windows-build/*
            artifacts/linux-build/*
            artifacts/linux-arm-build/*
            artifacts/mac-build/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
